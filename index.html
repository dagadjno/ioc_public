<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="YT7ezpTd58CwrSvDl9ZbdvqsOQbSvbmExzRPcemE6Bg" />
    <title>IOC Data</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            padding: 20px;
            margin: 0;
        }
        h1 {
            text-align: center;
            color: #ffffff;
            margin-bottom: 16px;
        }
        .toolbar {
            max-width: 1200px;
            margin: 0 auto 24px auto;
            text-align: center;
        }
        .toolbar a {
            color: #8ab4f8;
            text-decoration: none;
            font-size: 0.9em;
        }
        .toolbar a:hover { text-decoration: underline; color: #aecbfa; }

        .date-section {
            max-width: 1200px;
            margin: 0 auto 48px auto;
        }
        .date-section > h2 {
            font-size: 1.2em;
            color: #8ab4f8;
            border-bottom: 1px solid #333333;
            padding-bottom: 8px;
            margin-bottom: 20px;
        }

        .article-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 20px;
        }

        /* Card = one article */
        .article-card {
            background: #1e1e1e;
            border: 1px solid #333333;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* Article header */
        .article-header {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .article-title {
            font-size: 1.05em;
            font-weight: bold;
            color: #ffffff;
            margin: 0;
        }
        .field-label {
            font-size: 0.7em;
            color: #888888;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-top: 6px;
        }
        .article-header a {
            color: #8ab4f8;
            text-decoration: none;
            font-size: 0.85em;
            word-break: break-all;
        }
        .article-header a:hover {
            text-decoration: underline;
            color: #aecbfa;
        }
        .pub-date {
            font-size: 0.78em;
            color: #a0a0a0;
            margin-top: 4px;
        }
        .summary {
            font-size: 0.88em;
            color: #cccccc;
            line-height: 1.4;
            margin: 0;
        }

        /* Divider between article header and sources */
        .card-divider {
            border: none;
            border-top: 1px solid #2e2e2e;
            margin: 0;
        }

        /* One block per primary source inside a card */
        .source-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .source-section + .source-section {
            border-top: 1px solid #2e2e2e;
            padding-top: 14px;
        }
        .source-section--implicit {
            border-top: none !important;
            padding-top: 0 !important;
        }
        .source-section--implicit .ioc-list {
            border-top: none;
        }
        .source-section a {
            color: #8ab4f8;
            text-decoration: none;
            font-size: 0.85em;
            word-break: break-all;
        }
        .source-section a:hover {
            text-decoration: underline;
            color: #aecbfa;
        }

        .ioc-list {
            background: #121212;
            border: 1px solid #333333;
            border-radius: 4px;
            padding: 10px;
            max-height: 160px;
            overflow-y: auto;
        }
        .ioc-item {
            font-family: monospace;
            font-size: 0.85em;
            margin-bottom: 5px;
            word-break: break-all;
            color: #ff9a9e;
        }
        .ioc-item:last-child { margin-bottom: 0; }

        /* Filter bar */
        .filter-bar {
            max-width: 1200px;
            margin: 0 auto 28px auto;
            background: #1e1e1e;
            border: 1px solid #333333;
            border-radius: 8px;
            padding: 14px 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
        }
        .filter-bar-label {
            font-size: 0.75em;
            color: #888888;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            white-space: nowrap;
        }
        .filter-checkbox {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 0.9em;
            color: #e0e0e0;
            user-select: none;
        }
        .filter-checkbox input[type="checkbox"] {
            accent-color: #8ab4f8;
            width: 14px;
            height: 14px;
            cursor: pointer;
        }
        .filter-sep {
            width: 1px;
            align-self: stretch;
            background: #333333;
            margin: 0 4px;
        }
        .filter-bar select {
            background: #121212;
            color: #e0e0e0;
            border: 1px solid #333333;
            border-radius: 4px;
            padding: 5px 8px;
            font-size: 0.9em;
            cursor: pointer;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #121212; }
        ::-webkit-scrollbar-thumb { background: #444444; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555555; }
    </style>
</head>
<body>

    <h1>IOC Data</h1>
    <div class="toolbar"><a href="csvexport.html">View as table &rarr;</a></div>
    <div class="filter-bar" id="filter-bar">
        <span class="filter-bar-label">IOC Type</span>
        <span class="filter-types" id="filter-types"></span>
        <span class="filter-sep"></span>
        <span class="filter-bar-label">Date Added</span>
        <select id="filter-date"><option value="">All dates</option></select>
    </div>
    <div id="sections-container"></div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            fetch('iocs.csv')
                .then(response => {
                    if (!response.ok) throw new Error("Could not load iocs.csv");
                    return response.text();
                })
                .then(csvText => {
                    Papa.parse(csvText, {
                        header: true,
                        skipEmptyLines: true,
                        complete: function(results) {
                            processAndRenderData(results.data);
                        }
                    });
                })
                .catch(err => {
                    document.getElementById('sections-container').innerHTML =
                        `<p style="color: #ff6b6b;">Error: ${err.message}. Ensure you are running this through a local web server.</p>`;
                });
        });

        const activeTypes = new Set();
        let activeDate = '';

        function processAndRenderData(data) {
            // byDate[dateAdded][articleLink] = { title, summary, sources: { sourceUrl: Map<ioc, type> } }
            const byDate = {};
            const allTypes = new Set();

            data.forEach(row => {
                const title       = row['Original Article Title'];
                const articleLink = row['Original Article Link'];
                const sourceLink  = row['Source URL'] || articleLink;
                const ioc           = row['IOC'];
                const iocType       = row['IOC Type'] || 'Unknown';
                const summary       = row['Summary'];
                const publishedDate = row['Published Date'] || '';
                const dateAdded     = (row['Date Added'] || '').slice(0, 10) || 'Unknown Date';

                if (!title || !articleLink) return;

                if (ioc) allTypes.add(iocType);

                if (!byDate[dateAdded]) byDate[dateAdded] = {};
                if (!byDate[dateAdded][articleLink]) {
                    byDate[dateAdded][articleLink] = { title, summary, sources: {} };
                }

                const sources = byDate[dateAdded][articleLink].sources;
                if (!sources[sourceLink]) sources[sourceLink] = { iocs: new Map(), publishedDate };
                if (ioc) sources[sourceLink].iocs.set(ioc, iocType);
            });

            // Build IOC type checkboxes
            const typesContainer = document.getElementById('filter-types');
            [...allTypes].sort().forEach(type => {
                activeTypes.add(type);
                const label = document.createElement('label');
                label.className = 'filter-checkbox';

                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.checked = true;
                cb.value = type;
                cb.addEventListener('change', () => {
                    if (cb.checked) activeTypes.add(type); else activeTypes.delete(type);
                    applyFilter();
                });

                label.appendChild(cb);
                label.appendChild(document.createTextNode(type));
                typesContainer.appendChild(label);
            });

            const sortedDates = Object.keys(byDate).sort((a, b) => {
                if (a === 'Unknown Date') return 1;
                if (b === 'Unknown Date') return -1;
                return new Date(b) - new Date(a);
            });

            // Build Date Added dropdown (already newest-first)
            const dateSelect = document.getElementById('filter-date');
            sortedDates.forEach(date => {
                const opt = document.createElement('option');
                opt.value = date;
                opt.textContent = date === 'Unknown Date' ? 'Unknown Date' : date;
                dateSelect.appendChild(opt);
            });
            dateSelect.addEventListener('change', () => {
                activeDate = dateSelect.value;
                applyFilter();
            });

            const sectionsContainer = document.getElementById('sections-container');

            sortedDates.forEach(date => {
                const section = document.createElement('div');
                section.className = 'date-section';
                section.dataset.dateAdded = date;

                const heading = document.createElement('h2');
                heading.textContent = date === 'Unknown Date' ? 'Unknown Date' : `Added ${formatDate(date)}`;
                section.appendChild(heading);

                const grid = document.createElement('div');
                grid.className = 'article-grid';

                for (const [articleLink, articleData] of Object.entries(byDate[date])) {
                    const card = document.createElement('div');
                    card.className = 'article-card';

                    // Article header
                    const header = document.createElement('div');
                    header.className = 'article-header';

                    const titleEl = document.createElement('p');
                    titleEl.className = 'article-title';
                    titleEl.textContent = articleData.title;
                    header.appendChild(titleEl);

                    const articleLabel = document.createElement('span');
                    articleLabel.className = 'field-label';
                    articleLabel.textContent = 'Article';
                    header.appendChild(articleLabel);

                    const articleAnchor = document.createElement('a');
                    articleAnchor.href = articleLink;
                    articleAnchor.textContent = articleLink;
                    articleAnchor.target = '_blank';
                    articleAnchor.rel = 'noopener noreferrer';
                    header.appendChild(articleAnchor);

                    const allSources = Object.entries(articleData.sources);
                    const distinctSources = allSources.filter(([url]) => url !== articleLink);
                    const implicitSources = allSources.filter(([url]) => url === articleLink);

                    // Article published date (from the row where the source is the article itself)
                    const articleDate = implicitSources.length > 0 ? implicitSources[0][1].publishedDate : '';
                    if (articleDate) {
                        const dateEl = document.createElement('span');
                        dateEl.className = 'pub-date';
                        dateEl.textContent = `Published ${articleDate}`;
                        header.appendChild(dateEl);
                    }

                    card.appendChild(header);

                    if (articleData.summary) {
                        const summaryEl = document.createElement('p');
                        summaryEl.className = 'summary';
                        summaryEl.textContent = articleData.summary;
                        card.appendChild(summaryEl);
                    }

                    // Article's own IOCs first (no label)
                    for (const [sourceUrl, sourceData] of implicitSources) {
                        if (sourceData.iocs.size > 0) {
                            card.appendChild(buildIocList(sourceData.iocs));
                        }
                    }

                    // Divider + distinct primary sources below
                    if (distinctSources.length > 0) {
                        const hr = document.createElement('hr');
                        hr.className = 'card-divider';
                        card.appendChild(hr);

                        for (const [sourceUrl, sourceData] of distinctSources) {
                            const sourceSection = document.createElement('div');
                            sourceSection.className = 'source-section';

                            const sourceLabel = document.createElement('span');
                            sourceLabel.className = 'field-label';
                            sourceLabel.textContent = 'Primary Source';
                            sourceSection.appendChild(sourceLabel);

                            const sourceAnchor = document.createElement('a');
                            sourceAnchor.href = sourceUrl;
                            sourceAnchor.textContent = sourceUrl;
                            sourceAnchor.target = '_blank';
                            sourceAnchor.rel = 'noopener noreferrer';
                            sourceSection.appendChild(sourceAnchor);

                            if (sourceData.publishedDate) {
                                const dateEl = document.createElement('span');
                                dateEl.className = 'pub-date';
                                dateEl.textContent = `Published ${sourceData.publishedDate}`;
                                sourceSection.appendChild(dateEl);
                            }

                            if (sourceData.iocs.size > 0) {
                                sourceSection.appendChild(buildIocList(sourceData.iocs));
                            }

                            card.appendChild(sourceSection);
                        }
                    }

                    grid.appendChild(card);
                }

                section.appendChild(grid);
                sectionsContainer.appendChild(section);
            });
        }

        function applyFilter() {
            // Show/hide individual IOC items by type
            document.querySelectorAll('.ioc-item').forEach(el => {
                el.style.display = activeTypes.has(el.dataset.iocType) ? '' : 'none';
            });
            // Hide source-section if all its IOCs are hidden
            document.querySelectorAll('.source-section').forEach(section => {
                const anyVisible = [...section.querySelectorAll('.ioc-item')]
                    .some(el => el.style.display !== 'none');
                section.style.display = anyVisible ? '' : 'none';
            });
            // Hide article card if it has no visible IOC items at all
            document.querySelectorAll('.article-card').forEach(card => {
                const anyVisible = [...card.querySelectorAll('.ioc-item')]
                    .some(el => el.style.display !== 'none');
                card.style.display = anyVisible ? '' : 'none';
            });
            // Hide a date-section if it doesn't match the selected date,
            // or if all its cards are hidden by the type filter
            document.querySelectorAll('.date-section').forEach(section => {
                const dateOk = !activeDate || section.dataset.dateAdded === activeDate;
                const anyVisible = [...section.querySelectorAll('.article-card')]
                    .some(el => el.style.display !== 'none');
                section.style.display = (dateOk && anyVisible) ? '' : 'none';
            });
        }

        function buildIocList(iocs) {
            const iocContainer = document.createElement('div');
            iocContainer.className = 'ioc-list';
            [...iocs.entries()]
                .sort(([, typeA], [, typeB]) => typeA.localeCompare(typeB))
                .forEach(([ioc, iocType]) => {
                    const iocEl = document.createElement('div');
                    iocEl.className = 'ioc-item';
                    iocEl.dataset.iocType = iocType;
                    iocEl.textContent = ioc;
                    iocContainer.appendChild(iocEl);
                });
            return iocContainer;
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr + 'T00:00:00');
            return d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }
    </script>
</body>
</html>
