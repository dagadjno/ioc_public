<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IOC Data</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            padding: 20px;
            margin: 0;
        }
        h1 {
            text-align: center;
            color: #ffffff;
            margin-bottom: 30px;
        }
        .date-section {
            max-width: 1200px;
            margin: 0 auto 40px auto;
        }
        .date-section h2 {
            font-size: 1.2em;
            color: #8ab4f8;
            border-bottom: 1px solid #333333;
            padding-bottom: 8px;
            margin-bottom: 16px;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .card {
            background: #1e1e1e;
            border: 1px solid #333333;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }
        .card h3 {
            font-size: 1.1em;
            margin-top: 0;
            margin-bottom: 10px;
            color: #ffffff;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 10px;
        }
        .link-label {
            font-size: 0.75em;
            color: #888888;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .card a {
            color: #8ab4f8;
            text-decoration: none;
            font-size: 0.9em;
            word-break: break-all;
        }
        .card a:hover {
            text-decoration: underline;
            color: #aecbfa;
        }
        .summary {
            font-size: 0.9em;
            color: #cccccc;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        .ioc-list {
            background: #121212;
            border: 1px solid #333333;
            border-radius: 4px;
            padding: 10px;
            max-height: 200px;
            overflow-y: auto;
            flex-grow: 1;
        }
        .ioc-item {
            font-family: monospace;
            font-size: 0.85em;
            margin-bottom: 5px;
            word-break: break-all;
            color: #ff9a9e;
        }
        .ioc-item:last-child {
            margin-bottom: 0;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #121212;
        }
        ::-webkit-scrollbar-thumb {
            background: #444444;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555555;
        }
    </style>
</head>
<body>

    <h1>IOC Data</h1>
    <div id="sections-container"></div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            fetch('iocs.csv')
                .then(response => {
                    if (!response.ok) throw new Error("Could not load iocs.csv");
                    return response.text();
                })
                .then(csvText => {
                    Papa.parse(csvText, {
                        header: true,
                        skipEmptyLines: true,
                        complete: function(results) {
                            processAndRenderData(results.data);
                        }
                    });
                })
                .catch(err => {
                    document.getElementById('sections-container').innerHTML =
                        `<p style="color: #ff6b6b;">Error: ${err.message}. Ensure you are running this through a local web server.</p>`;
                });
        });

        function processAndRenderData(data) {
            // Group by dateAdded → title
            const byDate = {};

            data.forEach(row => {
                const title = row['Original Article Title'];
                const articleLink = row['Original Article Link'];
                const sourceLink = row['Source URL'];
                const ioc = row['IOC'];
                const summary = row['Summary'];
                const dateAdded = (row['Date Added'] || '').slice(0, 10) || 'Unknown Date';

                if (!title) return;

                if (!byDate[dateAdded]) {
                    byDate[dateAdded] = {};
                }

                if (!byDate[dateAdded][title]) {
                    byDate[dateAdded][title] = {
                        articleLink: articleLink,
                        sourceLink: sourceLink,
                        summary: summary,
                        iocs: new Set()
                    };
                }

                if (ioc) {
                    byDate[dateAdded][title].iocs.add(ioc);
                }
            });

            // Sort dates descending
            const sortedDates = Object.keys(byDate).sort((a, b) => {
                if (a === 'Unknown Date') return 1;
                if (b === 'Unknown Date') return -1;
                return new Date(b) - new Date(a);
            });

            const sectionsContainer = document.getElementById('sections-container');

            sortedDates.forEach(date => {
                const section = document.createElement('div');
                section.className = 'date-section';

                const heading = document.createElement('h2');
                heading.textContent = date === 'Unknown Date' ? 'Unknown Date' : `Added ${formatDate(date)}`;
                section.appendChild(heading);

                const grid = document.createElement('div');
                grid.className = 'container';

                const articles = byDate[date];
                for (const [title, info] of Object.entries(articles)) {
                    const card = document.createElement('div');
                    card.className = 'card';

                    const titleEl = document.createElement('h3');
                    titleEl.textContent = title;
                    card.appendChild(titleEl);

                    const linksEl = document.createElement('div');
                    linksEl.className = 'links';

                    if (info.articleLink) {
                        const articleLabel = document.createElement('span');
                        articleLabel.className = 'link-label';
                        articleLabel.textContent = 'Article';
                        linksEl.appendChild(articleLabel);

                        const articleAnchor = document.createElement('a');
                        articleAnchor.href = info.articleLink;
                        articleAnchor.textContent = info.articleLink;
                        articleAnchor.target = '_blank';
                        articleAnchor.rel = 'noopener noreferrer';
                        linksEl.appendChild(articleAnchor);
                    }

                    // Only show Source URL if it differs from the article link
                    if (info.sourceLink && info.sourceLink !== info.articleLink) {
                        const sourceLabel = document.createElement('span');
                        sourceLabel.className = 'link-label';
                        sourceLabel.textContent = 'Primary Source';
                        linksEl.appendChild(sourceLabel);

                        const sourceAnchor = document.createElement('a');
                        sourceAnchor.href = info.sourceLink;
                        sourceAnchor.textContent = info.sourceLink;
                        sourceAnchor.target = '_blank';
                        sourceAnchor.rel = 'noopener noreferrer';
                        linksEl.appendChild(sourceAnchor);
                    }

                    card.appendChild(linksEl);

                    if (info.summary) {
                        const summaryEl = document.createElement('p');
                        summaryEl.className = 'summary';
                        summaryEl.textContent = info.summary;
                        card.appendChild(summaryEl);
                    }

                    if (info.iocs.size > 0) {
                        const iocContainer = document.createElement('div');
                        iocContainer.className = 'ioc-list';

                        info.iocs.forEach(ioc => {
                            const iocEl = document.createElement('div');
                            iocEl.className = 'ioc-item';
                            iocEl.textContent = ioc;
                            iocContainer.appendChild(iocEl);
                        });

                        card.appendChild(iocContainer);
                    }

                    grid.appendChild(card);
                }

                section.appendChild(grid);
                sectionsContainer.appendChild(section);
            });
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr + 'T00:00:00');
            return d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }
    </script>
</body>
</html>
