<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IOC Data</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            padding: 20px;
            margin: 0;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: #1e1e1e;
            border: 1px solid #333333;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }
        .card h3 {
            font-size: 1.1em;
            margin-top: 0;
            margin-bottom: 5px;
            color: #ffffff;
        }
        .date {
            font-size: 0.85em;
            color: #a0a0a0;
            margin-bottom: 10px;
        }
        .card a {
            color: #8ab4f8;
            text-decoration: none;
            margin-bottom: 10px;
            font-size: 0.9em;
            word-break: break-all;
        }
        .card a:hover {
            text-decoration: underline;
            color: #aecbfa;
        }
        .summary {
            font-size: 0.9em;
            color: #cccccc;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        .ioc-list {
            background: #121212;
            border: 1px solid #333333;
            border-radius: 4px;
            padding: 10px;
            max-height: 200px;
            overflow-y: auto;
            flex-grow: 1;
        }
        .ioc-item {
            font-family: monospace;
            font-size: 0.85em;
            margin-bottom: 5px;
            word-break: break-all;
            color: #ff9a9e;
        }
        .ioc-item:last-child {
            margin-bottom: 0;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #121212;
        }
        ::-webkit-scrollbar-thumb {
            background: #444444;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555555;
        }
    </style>
</head>
<body>

    <div class="container" id="card-container"></div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            fetch('iocs.csv')
                .then(response => {
                    if (!response.ok) throw new Error("Could not load iocs.csv");
                    return response.text();
                })
                .then(csvText => {
                    Papa.parse(csvText, {
                        header: true,
                        skipEmptyLines: true,
                        complete: function(results) {
                            processAndRenderData(results.data);
                        }
                    });
                })
                .catch(err => {
                    document.getElementById('card-container').innerHTML = 
                        `<p style="color: #ff6b6b;">Error: ${err.message}. Ensure you are running this through a local web server.</p>`;
                });
        });

        function processAndRenderData(data) {
            const articles = {};

            data.forEach(row => {
                const title = row['Original Article Title'];
                const link = row['Original Article Link'] || row['Source URL'];
                const ioc = row['IOC'];
                const summary = row['Summary'];
                const publishedDate = row['Published Date'];

                if (!title) return;

                if (!articles[title]) {
                    articles[title] = {
                        link: link,
                        summary: summary,
                        publishedDate: publishedDate,
                        iocs: new Set()
                    };
                }
                
                if (ioc) {
                    articles[title].iocs.add(ioc);
                }
            });

            const container = document.getElementById('card-container');

            for (const [title, info] of Object.entries(articles)) {
                const card = document.createElement('div');
                card.className = 'card';

                const titleEl = document.createElement('h3');
                titleEl.textContent = title;
                card.appendChild(titleEl);

                if (info.publishedDate) {
                    const dateEl = document.createElement('div');
                    dateEl.className = 'date';
                    dateEl.textContent = `Published: ${info.publishedDate}`;
                    card.appendChild(dateEl);
                }

                if (info.link) {
                    const linkEl = document.createElement('a');
                    linkEl.href = info.link;
                    linkEl.textContent = info.link;
                    linkEl.target = "_blank";
                    linkEl.rel = "noopener noreferrer";
                    card.appendChild(linkEl);
                }

                if (info.summary) {
                    const summaryEl = document.createElement('p');
                    summaryEl.className = 'summary';
                    summaryEl.textContent = info.summary;
                    card.appendChild(summaryEl);
                }

                if (info.iocs.size > 0) {
                    const iocContainer = document.createElement('div');
                    iocContainer.className = 'ioc-list';
                    
                    info.iocs.forEach(ioc => {
                        const iocEl = document.createElement('div');
                        iocEl.className = 'ioc-item';
                        iocEl.textContent = ioc;
                        iocContainer.appendChild(iocEl);
                    });
                    
                    card.appendChild(iocContainer);
                }

                container.appendChild(card);
            }
        }
    </script>
</body>
</html>
